apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: simple-python-web-app-pull-request
  namespace: default
  annotations:
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/on-event: "[pull_request]"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "pull_request" && target_branch == "main"
spec:
  params:
  - name: git_url
    value: {{ repo_url }}
  - name: revision
    value: {{ revision }}
  pipelineSpec:
    tasks:
    - name: clone
      taskSpec:
        steps:
        - name: clone
          image: registry.access.redhat.com/ubi10/ubi-minimal:10.2@sha256:b217fa65d8c21058887b18f005f587e47a17dd1281a5196ac88d01724a273dbd
          script: |
            echo "Get the code"
